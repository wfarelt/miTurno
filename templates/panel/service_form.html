{% extends "panel/base.html" %}

{% block title %}Servicio{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Servicio</h1>
<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Guardar</button>
      <a class="btn btn-link" href="{% url 'panel:services-list' %}">Volver</a>
    </form>
  </div>
</div>
{% endblock %}
